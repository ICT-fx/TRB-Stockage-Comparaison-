services:
  # ── Backend Python (FastAPI) ──
  - type: web
    name: trb-stock-compare-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

  # ── Frontend Static Site ──
  - type: web
    name: trb-stock-compare-front
    runtime: static
    rootDir: frontend
    buildCommand: echo "No build needed"
    staticPublishPath: .
    plan: free
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
